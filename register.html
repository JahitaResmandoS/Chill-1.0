<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHILL 1.0</title>
    <link rel="shortcut icon" href="assets/Vector.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/register.css" />
  </head>

  <body>
    <main class="register-container">
      <div class="register-card">
        <img src="assets/login_logo.png" alt="login-icon" id="login-logo" />
        <div class="register-card-title">
          <h1>Daftar</h1>
          <p>Selamat datang!</p>
        </div>
        <form action="" method="post">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              name="username"
              placeholder="Masukkan username"
              required
            />
          </div>
          <div class="form-group">
            <label for="kata sandi">Kata Sandi</label>
            <input
              type="text"
              name="katasandi"
              placeholder="Masukkan kata sandi"
              required
            />
            <img src="assets/eye-off (1).png" alt="eye-icon" />
          </div>
          <div class="form-group">
            <label for="kata sandi">Konfirmasi kata Sandi</label>
            <input
              type="text"
              name="konfirmasikatasandi"
              placeholder="Masukkan kata sandi"
              required
            />
            <img src="assets/eye-off (1).png" alt="eye-icon" />
          </div>
          <div class="register-card-additional-1">
            <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
          </div>
          <div class="register-card-action">
            <button type="submit" class="register-button">Daftar</button>
            <p>Atau</p>
            <button
              type="button"
              class="register-button google-register-button"
            >
              <img src="assets/google-icon.png" alt="google-icon" />
              <p>Daftar dengan Google</p>
            </button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
