<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHILL 1.0</title>
    <link rel="shortcut icon" href="assets/Vector.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/login.css" />
  </head>

  <body>
    <main class="login-container">
      <div class="login-card">
        <img src="assets/login_logo.png" alt="login-icon" id="login-logo" />
        <div class="login-card-title">
          <h1>Masuk</h1>
          <p>Selamat datang kembali!</p>
        </div>
        <form action="" method="post">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              name="username"
              placeholder="Masukkan username"
              required
            />
          </div>
          <div class="form-group">
            <label for="kata sandi">Kata Sandi</label>
            <input
              type="text"
              name="katasandi"
              placeholder="Masukkan kata sandi"
              required
            />
            <img src="assets/eye-off (1).png" alt="eye-icon" />
          </div>
          <div class="login-card-additional-1">
            <p>Belum punya akun? <a href="register.html">Daftar</a></p>
            <a href="#">Lupa kata sandi?</a>
          </div>
          <div class="login-card-action">
            <button type="submit" class="login-button">Masuk</button>
            <p>Atau</p>
            <button type="button" class="login-button google-login-button">
              <img src="assets/google-icon.png" alt="google-icon" />
              <p>Masuk dengan Google</p>
            </button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
